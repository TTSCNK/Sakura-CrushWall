<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>后台管理登录 - 樱花表白墙</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-color: #ffdee9;
            background-image: linear-gradient(0deg, #ffdee9 0%, #b5fffc 100%);
            height: 100vh;
            overflow: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        /* 樱花动画 */
        .sakura { position: absolute; background-color: #ffc0cb; border-radius: 100% 0 100% 0; animation: fall infinite linear; pointer-events: none;}
        @keyframes fall { to { transform: translate(100px, 100vh) rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center relative">

    <div id="sakura-container" class="absolute inset-0 z-0"></div>

    <div class="glass w-full max-w-sm p-8 rounded-3xl z-10 mx-4 transform transition hover:scale-105 duration-300">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-tr from-pink-400 to-rose-400 rounded-full mx-auto flex items-center justify-center shadow-lg mb-4 text-white text-3xl">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-700">后台管理系统</h2>
            <p class="text-xs text-pink-500 mt-1">Authorized Personnel Only</p>
        </div>

        <form method="post" action="sakura.php" class="space-y-5">
            <div class="relative">
                <i class="fa-solid fa-user absolute left-4 top-3.5 text-gray-400"></i>
                <input class="w-full pl-10 pr-4 py-3 rounded-xl bg-white/50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition text-sm text-gray-700 placeholder-gray-400" 
                       placeholder="管理员账号" name="zh" type="text" required />
            </div>
            <div class="relative">
                <i class="fa-solid fa-lock absolute left-4 top-3.5 text-gray-400"></i>
                <input class="w-full pl-10 pr-4 py-3 rounded-xl bg-white/50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-pink-300 transition text-sm text-gray-700 placeholder-gray-400" 
                       placeholder="管理员密码" name="mm" type="password" required />
            </div>
            
            <button type="submit" class="w-full bg-gradient-to-r from-pink-500 to-rose-500 text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg active:scale-95 transition duration-200">
                <i class="fa-solid fa-arrow-right-to-bracket mr-2"></i> 立即登录
            </button>
        </form>
        
        <div class="mt-6 text-center text-xs text-gray-400">
            Powered by Sakura Panel
        </div>
    </div>

    <script>
        setInterval(() => {
            const el = document.createElement('div');
            el.classList.add('sakura');
            el.style.left = Math.random() * 100 + '%';
            el.style.top = '-10px';
            const size = Math.random() * 10 + 5;
            el.style.width = size + 'px'; el.style.height = size + 'px';
            el.style.animationDuration = Math.random() * 5 + 5 + 's';
            document.getElementById('sakura-container').appendChild(el);
            setTimeout(() => el.remove(), 10000);
        }, 500);
    </script>
</body>
</html>
